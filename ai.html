<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TobaKart Pro - AI Social Media Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Dark scrollbar for sidebar */
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #475569; }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px; background: #4f46e5; border-radius: 50%; display: inline-block; margin: 0 2px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
        
        /* Smooth transitions */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Professional Markdown Formatting */
        .markdown-body { color: #334155; line-height: 1.6; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 700; color: #0f172a; margin-top: 1.5em; margin-bottom: 0.75em; }
        .markdown-body h1 { font-size: 1.5em; }
        .markdown-body h2 { font-size: 1.25em; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body li { margin-bottom: 0.25em; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; font-size: 0.9em; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 0.75em; text-align: left; }
        .markdown-body th { background-color: #f1f5f9; font-weight: 600; color: #0f172a; }
        .markdown-body tr:nth-child(even) { background-color: #f8fafc; }
        .markdown-body strong { font-weight: 600; color: #1e293b; }
        .markdown-body em { font-style: italic; }
        .markdown-body blockquote { border-left: 4px solid #4f46e5; padding-left: 1em; color: #64748b; background: #f8fafc; padding: 0.5em 1em; margin-bottom: 1em; border-radius: 0 0.5rem 0.5rem 0; }
        .markdown-body code { background-color: #f1f5f9; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.9em; color: #ef4444; font-family: monospace; }
        .markdown-body pre { background-color: #1e293b; padding: 1em; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1em; }
        .markdown-body pre code { background-color: transparent; color: #e2e8f0; padding: 0; }
        
        /* Mobile Sidebar Overlay */
        #mobile-overlay { display: none; }
        #mobile-overlay.active { display: block; animation: fadeIn 0.2s ease-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 z-30" onclick="toggleMobileSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="absolute md:relative z-40 h-full flex flex-col w-72 bg-slate-900 text-white transform -translate-x-full md:translate-x-0 transition-transform duration-300 shadow-2xl md:shadow-none shrink-0">
        <div class="p-5 flex items-center justify-between border-b border-slate-700">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 p-2 rounded-lg"><i class="fas fa-layer-group text-xl"></i></div>
                <h1 class="text-2xl font-bold tracking-tight">TobaKart</h1>
            </div>
            <button class="md:hidden text-slate-400 hover:text-white" onclick="toggleMobileSidebar()">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <div class="p-4 flex-none space-y-2">
            <button onclick="showView('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl transition text-left font-medium shadow-md">
                <i class="fas fa-th-large w-5 text-center"></i> AI Dashboard
            </button>
            <button onclick="createNewEmptyChat()" class="w-full flex items-center gap-3 px-4 py-3 border border-slate-700 hover:bg-slate-800 rounded-xl transition text-left text-white font-medium">
                <i class="fas fa-plus w-5 text-center"></i> New Chat
            </button>
            
            <!-- Search Chat History -->
            <div class="relative mt-4">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text" id="search-history" placeholder="Search chats..." class="w-full bg-slate-800 text-white rounded-xl pl-9 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 border-none outline-none transition-all placeholder-slate-500">
            </div>
        </div>

        <!-- Chat History List -->
        <nav class="flex-1 overflow-y-auto sidebar-scroll px-2 pb-4 flex flex-col gap-1" id="history-list">
            <!-- Dynamically injected history items -->
        </nav>

        <div class="p-4 border-t border-slate-700 flex-none">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center border-2 border-indigo-500">
                    <i class="fas fa-user text-slate-300"></i>
                </div>
                <div>
                    <p class="text-sm font-medium">Admin Panel</p>
                    <p class="text-xs text-indigo-400">Pro Version</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen relative overflow-hidden bg-white">
        
        <!-- Mobile Header -->
        <header class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-20 flex-none">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileSidebar()" class="p-1 hover:text-indigo-400 transition-colors">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div class="bg-indigo-500 p-1.5 rounded-md"><i class="fas fa-layer-group text-sm"></i></div>
                <h1 class="text-lg font-bold tracking-tight">TobaKart AI</h1>
            </div>
            <button onclick="createNewEmptyChat()" class="p-2 hover:text-indigo-400 transition-colors"><i class="fas fa-plus"></i></button>
        </header>

        <!-- DASHBOARD VIEW -->
        <div id="view-dashboard" class="flex-1 overflow-y-auto p-4 md:p-8 fade-in bg-slate-50">
            <div class="max-w-7xl mx-auto pb-10">
                <div class="mb-8 mt-2 md:mt-0">
                    <h2 class="text-3xl font-bold text-slate-900 mb-2">Social Media Suite</h2>
                    <p class="text-slate-500">Select an AI tool below to start a new optimized session.</p>
                </div>
                
                <!-- Tools Grid -->
                <div id="tools-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <!-- Cards injected by JS -->
                </div>
            </div>
        </div>

        <!-- CHAT WORKSPACE VIEW (FLEX COLUMN REWRITE FOR PERFECT SCROLLING) -->
        <div id="view-chat" class="flex-1 flex flex-col hidden fade-in h-full bg-slate-50 overflow-hidden">
            
            <!-- Workspace Header (Fixed at top of flex container) -->
            <div class="flex-none p-4 border-b border-slate-200 flex items-center justify-between bg-white shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <button onclick="showView('dashboard')" class="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors"><i class="fas fa-arrow-left"></i></button>
                    <div id="current-tool-icon" class="bg-indigo-100 text-indigo-600 p-2.5 rounded-xl"><i class="fas fa-robot"></i></div>
                    <div>
                        <h2 id="current-tool-title" class="font-bold text-slate-800 leading-tight">General AI Assistant</h2>
                        <p class="text-xs text-slate-500 font-medium">TobaKart Smart Engine</p>
                    </div>
                </div>
                <span class="px-3 py-1.5 bg-green-50 text-green-700 text-xs font-bold rounded-full flex items-center gap-1.5 border border-green-200">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> Online
                </span>
            </div>

            <!-- Chat Area (Takes remaining space, scrolls internally) -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-6 scroll-smooth">
                <!-- Messages injected here -->
            </div>

            <!-- Input Area (Fixed at bottom of flex container) -->
            <div class="flex-none p-4 bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] relative z-10">
                <div class="max-w-4xl mx-auto relative flex items-end gap-2">
                    <textarea id="user-input" rows="1" placeholder="Type your prompt here... (Shift+Enter for new line)" class="w-full bg-slate-100 border border-slate-200 rounded-xl py-3.5 px-4 pr-14 resize-none focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 max-h-40 overflow-y-auto transition-all text-sm md:text-base outline-none shadow-inner"></textarea>
                    <button id="send-btn" class="absolute right-2 bottom-2 bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-lg transition-colors shadow-md w-10 h-10 flex items-center justify-center active:scale-95">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="text-center mt-2 text-[10px] text-slate-400 font-medium">TobaKart AI generates content based on enterprise guidelines. AI can make mistakes.</div>
            </div>
        </div>

    </main>

    <script>
        // Configuration
        const API_KEY = "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";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const STORAGE_KEY = "tobakart_ai_chats";

        // AI Tools Definition
        const aiTools = [
            { id: 'content', icon: 'fa-pen-nib', title: 'Content Gen', color: 'bg-blue-500', 
              prompt: 'ROLE: Professional Content Creator. EXPERTISE: High-quality, engaging written articles and posts. RESTRICTIONS: ONLY generate the content body. DO NOT generate SEO metadata, DO NOT generate scripts, DO NOT write prompts. OUTPUT FORMAT: Professional Markdown.' },
            
            { id: 'seo', icon: 'fa-search', title: 'SEO Optimizer', color: 'bg-emerald-500', 
              prompt: 'ROLE: Enterprise SEO Expert. RESTRICTIONS: YOU MUST ONLY GENERATE SEO METADATA. DO NOT write scripts, content body, or captions under any circumstances. OUTPUT FORMAT REQUIRED: Bulleted or numbered lists showing strictly: 1. SEO Title, 2. SEO Description, 3. Meta Description, 4. Keywords, 5. Search Intent, 6. Slug, 7. Alt Text, 8. Tags, 9. Internal/External Suggestions. Nothing else.' },
            
            { id: 'prompt', icon: 'fa-terminal', title: 'Prompt Gen', color: 'bg-purple-500', 
              prompt: 'ROLE: Master Prompt Engineer. RESTRICTIONS: ONLY CREATE PROMPTS. NEVER answer the prompt itself. Convert the user\'s idea into a highly professional, detailed prompt meant to be fed into an AI (like ChatGPT or Midjourney). OUTPUT FORMAT: Code block or markdown block containing the final prompt.' },
            
            { id: 'thumb', icon: 'fa-image', title: 'Thumb Prompt', color: 'bg-pink-500', 
              prompt: 'ROLE: YouTube Thumbnail Image Prompt Designer. RESTRICTIONS: ONLY generate highly detailed Midjourney/DALL-E image prompts for thumbnails. DO NOT generate SEO, DO NOT write video scripts, DO NOT write captions. OUTPUT FORMAT: Clean, descriptive image generation prompts separated by bullet points.' },
            
            { id: 'banner', icon: 'fa-panorama', title: 'Banner Prompt', color: 'bg-orange-500', 
              prompt: 'ROLE: Web & Social Banner Prompt Designer. RESTRICTIONS: ONLY generate detailed image generation prompts for website banners and social media covers. DO NOT write website code, DO NOT write marketing copy. OUTPUT FORMAT: Image generation prompts only.' },
            
            { id: 'reel', icon: 'fa-video', title: 'Reel Script', color: 'bg-rose-500', 
              prompt: 'ROLE: Instagram/TikTok Reel Scriptwriter. RESTRICTIONS: ONLY write 30-60 second fast-paced video scripts. DO NOT write YouTube long-form scripts, DO NOT generate hashtags. OUTPUT FORMAT: Use a strict Markdown Table with columns for [Time], [Visual/B-Roll], and [Audio/Voiceover].' },
            
            { id: 'youtube', icon: 'fa-youtube', title: 'YT Script', color: 'bg-red-600', 
              prompt: 'ROLE: Long-form YouTube Video Scriptwriter. RESTRICTIONS: ONLY write YouTube video scripts (Hook, Intro, Body, Outro). DO NOT generate thumbnail prompts or SEO. OUTPUT FORMAT: Structured Markdown with Headers for each video section, including timestamps and B-roll cues.' },
            
            { id: 'hook', icon: 'fa-fish', title: 'Viral Hook', color: 'bg-cyan-500', 
              prompt: 'ROLE: Viral Hook Specialist. RESTRICTIONS: ONLY generate 5 highly clickable, attention-grabbing hooks (first 3 seconds). DO NOT write the rest of the script, DO NOT write captions. OUTPUT FORMAT: A numbered list of 5 powerful hooks.' },
            
            { id: 'hashtag', icon: 'fa-hashtag', title: 'Hashtag Gen', color: 'bg-teal-500', 
              prompt: 'ROLE: Social Media Hashtag Strategist. RESTRICTIONS: ONLY generate hashtags. DO NOT write captions, DO NOT write content. OUTPUT FORMAT: Produce exactly 30 highly targeted hashtags (categorized into Broad, Niche, and Trending) separated by spaces.' },
            
            { id: 'caption', icon: 'fa-align-left', title: 'Caption Gen', color: 'bg-indigo-500', 
              prompt: 'ROLE: Social Media Copywriter. RESTRICTIONS: ONLY write engaging captions for posts. DO NOT write hashtags (unless requested as part of the caption), DO NOT write video scripts. OUTPUT FORMAT: Formatted text with appropriate emojis and strong Call-to-Actions (CTAs).' },
            
            { id: 'calendar', icon: 'fa-calendar-alt', title: 'Content Calendar', color: 'bg-sky-500', 
              prompt: 'ROLE: Social Media Strategist. RESTRICTIONS: ONLY create content posting calendars. DO NOT write the actual content or scripts. OUTPUT FORMAT: MUST use a Markdown Table detailing Day, Platform, Content Theme, Format (Reel/Post/Story), and Status.' },
            
            { id: 'competitor', icon: 'fa-chart-line', title: 'Competitor AI', color: 'bg-fuchsia-500', 
              prompt: 'ROLE: Competitor Analysis Expert. RESTRICTIONS: ONLY provide competitor strategy analysis and counter-strategies. DO NOT generate content, scripts, or SEO. OUTPUT FORMAT: Professional report layout using Markdown headers and bullet points.' },
            
            { id: 'trend', icon: 'fa-fire', title: 'Trend Analyzer', color: 'bg-yellow-500', 
              prompt: 'ROLE: Trend Forecaster. RESTRICTIONS: ONLY suggest current social media trends, audios, and meme formats. DO NOT write full scripts or generate images. OUTPUT FORMAT: Categorized lists of current trends.' },
            
            { id: 'schedule', icon: 'fa-clock', title: 'Posting Plan', color: 'bg-lime-500', 
              prompt: 'ROLE: Posting Schedule Manager. RESTRICTIONS: ONLY provide strategic scheduling plans and best times to post. DO NOT create content calendars or write posts. OUTPUT FORMAT: Time-based schedules and timezone recommendations.' },
            
            { id: 'analytics', icon: 'fa-chart-pie', title: 'Analytics AI', color: 'bg-violet-500', 
              prompt: 'ROLE: Data Analyst. RESTRICTIONS: ONLY analyze provided metrics and offer insights. DO NOT generate new marketing content. OUTPUT FORMAT: Bulleted insights showing "What Worked", "What Failed", and "Actionable Next Steps".' },
            
            { id: 'multilang', icon: 'fa-language', title: 'Multi-Lang', color: 'bg-blue-400', 
              prompt: 'ROLE: Professional Translator. RESTRICTIONS: ONLY translate the user provided content strictly into English, Hindi, and Gujarati. DO NOT alter the original meaning or add new information. OUTPUT FORMAT: Clearly separated headers for [English], [Hindi], and [Gujarati].' },
            
            { id: 'product', icon: 'fa-box-open', title: 'Product AI', color: 'bg-amber-500', 
              prompt: 'ROLE: E-commerce Copywriter. RESTRICTIONS: ONLY write product descriptions. DO NOT write landing page copy or email sequences. OUTPUT FORMAT: Engaging description featuring Hooks, Features (bullets), Benefits (bullets), and a final CTA.' },
            
            { id: 'email', icon: 'fa-envelope-open-text', title: 'Email Copy', color: 'bg-red-400', 
              prompt: 'ROLE: Email Marketing Specialist. RESTRICTIONS: ONLY write email copy and subject lines. DO NOT write social media captions or ad copy. OUTPUT FORMAT: Clear subject lines followed by the email body formatted professionally.' },
            
            { id: 'ad', icon: 'fa-bullhorn', title: 'Ad Copy', color: 'bg-orange-600', 
              prompt: 'ROLE: Performance Marketing Copywriter. RESTRICTIONS: ONLY write Facebook/Google Ad copies. DO NOT write product descriptions or landing pages. OUTPUT FORMAT: Ad copies utilizing the AIDA framework, including Primary Text, Headline, and Description.' },
            
            { id: 'landing', icon: 'fa-laptop-code', title: 'Landing Page', color: 'bg-indigo-400', 
              prompt: 'ROLE: Landing Page Copywriter. RESTRICTIONS: ONLY write structured landing page copy. DO NOT write code (HTML/CSS), DO NOT write emails. OUTPUT FORMAT: Markdown headers for [Hero Section], [Pain Points], [Solutions], [Testimonials], and [FAQs].' }
        ];

        const basePrompt = `You are the core AI Engine for 'TobaKart AI Social Media Suite'. Your MOST IMPORTANT RULE is STRICT ROLE ISOLATION. You must ONLY perform the specific task assigned to your current active role. Refuse to mix functionalities (e.g. if you are the SEO tool, refuse to write scripts; if you are the Script tool, refuse to generate SEO). Always format output professionally using Markdown (Headers, Bullet points, Tables, Bold text). Use Hinglish if appropriate based on user prompt, otherwise use English.`;

        // Application State
        let chats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentChatId = null;
        let currentTool = aiTools[0];
        let chatHistory = [];

        // DOM Elements
        const grid = document.getElementById('tools-grid');
        const viewDashboard = document.getElementById('view-dashboard');
        const viewChat = document.getElementById('view-chat');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const toolTitle = document.getElementById('current-tool-title');
        const toolIcon = document.getElementById('current-tool-icon');
        const historyList = document.getElementById('history-list');
        const searchInput = document.getElementById('search-history');
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobile-overlay');

        // Helpers
        const generateUUID = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
        
        const saveChats = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
            renderHistoryList(searchInput.value);
        };

        const getSystemPrompt = (tool) => basePrompt + "\n\nRIGHT NOW YOUR SPECIFIC ROLE IS: " + tool.prompt;

        const formatAutoTitle = (text) => {
            let title = text.replace(/^(write|create|generate|make|a|an|the)\s+/i, '');
            let words = title.split(' ');
            return words.slice(0, 5).join(' ') + (words.length > 5 ? '...' : '');
        };

        function toggleMobileSidebar() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                mobileOverlay.classList.add('active');
            } else {
                sidebar.classList.add('-translate-x-full');
                mobileOverlay.classList.remove('active');
            }
        }

        // Render Dashboard Tools Grid
        aiTools.forEach(tool => {
            const card = document.createElement('div');
            card.className = `bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-lg transition-all cursor-pointer hover:-translate-y-1.5 group flex flex-col items-center text-center gap-3 relative overflow-hidden`;
            card.onclick = () => {
                activateTool(tool);
                if(window.innerWidth < 768) toggleMobileSidebar(); // Close sidebar if open on mobile
            };
            card.innerHTML = `
                <div class="absolute inset-0 bg-gradient-to-br from-transparent to-slate-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="w-14 h-14 ${tool.color} text-white rounded-2xl flex items-center justify-center text-2xl shadow-inner group-hover:scale-110 transition-transform relative z-10">
                    <i class="fas ${tool.icon}"></i>
                </div>
                <h3 class="font-bold text-slate-700 text-sm group-hover:text-indigo-600 transition-colors relative z-10">${tool.title}</h3>
            `;
            grid.appendChild(card);
        });

        // Chat History UI Logic
        function renderHistoryList(query = '') {
            historyList.innerHTML = '';
            
            let filteredChats = chats.filter(c => 
                c.title.toLowerCase().includes(query.toLowerCase()) || 
                c.messages.some(m => m.role !== 'system' && m.content.toLowerCase().includes(query.toLowerCase()))
            );

            // Sort by updated at descending
            filteredChats.sort((a, b) => b.updatedAt - a.updatedAt);

            if(filteredChats.length === 0) {
                historyList.innerHTML = `<div class="text-center text-slate-500 text-xs py-4">No chats found.</div>`;
                return;
            }

            filteredChats.forEach(chat => {
                const isActive = chat.id === currentChatId;
                const date = new Date(chat.updatedAt);
                const timeString = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

                const item = document.createElement('div');
                item.className = `group flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer transition-all ${isActive ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-300'}`;
                
                item.innerHTML = `
                    <div class="flex-1 min-w-0 overflow-hidden pr-2" onclick="loadChat('${chat.id}')">
                        <div class="text-sm font-semibold truncate ${isActive ? 'text-white' : 'text-slate-200'}">${chat.title}</div>
                        <div class="text-[11px] font-medium mt-0.5 flex gap-1.5 truncate ${isActive ? 'text-indigo-200' : 'text-slate-500'}">
                            <span><i class="fas ${aiTools.find(t => t.title === chat.tool)?.icon || 'fa-robot'}"></i> ${chat.tool}</span>
                            <span>&bull;</span>
                            <span>${timeString}</span>
                        </div>
                    </div>
                    <div class="hidden group-hover:flex items-center gap-2 pl-1 shrink-0">
                        <button onclick="renameChat('${chat.id}', event)" class="w-6 h-6 rounded-md flex items-center justify-center bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white transition-colors" title="Rename"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="w-6 h-6 rounded-md flex items-center justify-center bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white transition-colors" title="Delete"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                `;
                historyList.appendChild(item);
            });
        }

        searchInput.addEventListener('input', (e) => renderHistoryList(e.target.value));

        function renameChat(id, event) {
            event.stopPropagation();
            const chat = chats.find(c => c.id === id);
            if(!chat) return;
            const newTitle = prompt("Enter new chat title:", chat.title);
            if(newTitle && newTitle.trim() !== "") {
                chat.title = newTitle.trim();
                saveChats();
            }
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if(confirm("Are you sure you want to delete this conversation?")) {
                chats = chats.filter(c => c.id !== id);
                if(currentChatId === id) {
                    createNewEmptyChat();
                } else {
                    saveChats();
                }
            }
        }

        function createNewEmptyChat() {
            currentChatId = null;
            chatHistory = [];
            showView('dashboard');
            renderHistoryList(searchInput.value);
            if(window.innerWidth < 768) toggleMobileSidebar();
        }

        function loadChat(id) {
            const chat = chats.find(c => c.id === id);
            if(!chat) return;
            
            currentChatId = id;
            currentTool = aiTools.find(t => t.title === chat.tool) || aiTools[0];
            chatHistory = chat.messages;

            // Update UI
            toolTitle.textContent = currentTool.title;
            toolIcon.innerHTML = `<i class="fas ${currentTool.icon}"></i>`;
            chatContainer.innerHTML = '';
            
            // Re-render messages
            chatHistory.forEach(msg => {
                if (msg.role !== 'system') {
                    appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false);
                }
            });

            renderHistoryList(searchInput.value);
            showView('chat');
            scrollToBottom();
            if(window.innerWidth < 768) toggleMobileSidebar();
        }

        // View Management
        function showView(view) {
            if (view === 'dashboard') {
                viewDashboard.classList.remove('hidden');
                viewChat.classList.add('hidden');
            } else {
                viewDashboard.classList.add('hidden');
                viewChat.classList.remove('hidden');
                userInput.focus();
                scrollToBottom();
            }
        }

        // Activate New Tool Session
        function activateTool(tool) {
            currentTool = tool;
            currentChatId = null;
            toolTitle.textContent = tool.title;
            toolIcon.innerHTML = `<i class="fas ${tool.icon}"></i>`;
            
            chatHistory = [{ role: "system", content: getSystemPrompt(tool), timestamp: Date.now() }];
            
            chatContainer.innerHTML = '';
            appendMessage('ai', `**${tool.title}** mode activated! ✅\n\nI am locked into this specific role. Main aapki kaise madad kar sakta hu is feature me? Muje detail me batayein.`, false);
            
            renderHistoryList(searchInput.value);
            showView('chat');
        }

        // Scroll Logic Guarantee
        function scrollToBottom() {
            // Use setTimeout to ensure DOM has completely rendered new heights before scrolling
            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        // Chat Input Logic
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px'; // Max 40 roughly equals 160px
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Initial State Setup if new chat
            if (!currentChatId) {
                currentChatId = generateUUID();
                const title = formatAutoTitle(text);
                const newChat = {
                    id: currentChatId,
                    title: title || "New Chat",
                    tool: currentTool.title,
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                    messages: [...chatHistory]
                };
                chats.unshift(newChat);
            }

            // 2. Add user message
            const msgObj = { role: "user", content: text, timestamp: Date.now() };
            chatHistory.push(msgObj);
            
            const activeChat = chats.find(c => c.id === currentChatId);
            activeChat.messages = [...chatHistory];
            activeChat.updatedAt = Date.now();
            saveChats();

            appendMessage('user', text, true);
            
            userInput.value = '';
            userInput.style.height = 'auto';

            const typingId = showTypingIndicator();

            // 3. API Call
            try {
                // Prepare API messages (strip timestamp for openrouter)
                const apiMessages = chatHistory.map(m => ({ role: m.role, content: m.content }));

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'TobaKart AI Suite',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-3.5-turbo",
                        messages: apiMessages
                    })
                });

                const data = await response.json();
                removeElement(typingId);

                if (data.choices && data.choices.length > 0) {
                    const aiResponse = data.choices[0].message.content;
                    
                    // Save AI Message
                    chatHistory.push({ role: "assistant", content: aiResponse, timestamp: Date.now() });
                    activeChat.messages = [...chatHistory];
                    activeChat.updatedAt = Date.now();
                    saveChats();

                    appendMessage('ai', aiResponse, true);
                } else {
                    appendMessage('error', "API Error. Check API Key or limits.", true);
                }
            } catch (error) {
                removeElement(typingId);
                appendMessage('error', "Network error! Please check your connection.", true);
            }
        }

        // Copy functionality with Clipboard API and fallback
        function copyToClipboard(text, buttonElement) {
            const originalHTML = buttonElement.innerHTML;
            
            const showSuccess = () => {
                buttonElement.innerHTML = `<i class="fas fa-check"></i> Copied Successfully ✓`;
                buttonElement.classList.replace('bg-indigo-50', 'bg-green-500');
                buttonElement.classList.replace('text-indigo-600', 'text-white');
                buttonElement.classList.replace('hover:bg-indigo-100', 'hover:bg-green-600');
                
                setTimeout(() => {
                    buttonElement.innerHTML = originalHTML;
                    buttonElement.classList.replace('bg-green-500', 'bg-indigo-50');
                    buttonElement.classList.replace('text-white', 'text-indigo-600');
                    buttonElement.classList.replace('hover:bg-green-600', 'hover:bg-indigo-100');
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showSuccess).catch(err => console.error("Clipboard copy failed", err));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                textArea.remove();
            }
        }

        function appendMessage(sender, text, shouldScroll = true) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} fade-in w-full`;
            
            if (sender === 'user') {
                let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                div.innerHTML = `
                    <div class="bg-indigo-600 text-white p-3.5 px-5 rounded-2xl rounded-br-none shadow-md max-w-[95%] md:max-w-[80%]">
                        <p class="leading-relaxed whitespace-pre-wrap">${formattedText}</p>
                    </div>
                `;
            } else if (sender === 'ai') {
                let formattedText = typeof marked !== 'undefined' ? marked.parse(text) : text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                
                div.innerHTML = `
                    <div class="bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none shadow-sm max-w-[95%] md:max-w-[85%] overflow-hidden flex flex-col relative w-full">
                        <div class="bg-slate-50 border-b border-slate-100 px-4 py-2 flex justify-between items-center sticky top-0 z-10">
                            <p class="font-bold text-indigo-600 text-sm flex items-center gap-1.5"><i class="fas fa-check-circle"></i> TobaKart AI</p>
                            <button class="copy-action-btn flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-xs font-semibold rounded-lg transition-all duration-300 shadow-sm cursor-pointer active:scale-95">
                                <i class="far fa-copy"></i> Copy Response
                            </button>
                        </div>
                        <div class="p-4 md:p-6 markdown-body overflow-x-auto text-sm md:text-base bg-white">
                            ${formattedText}
                        </div>
                    </div>
                `;
                
                const copyBtn = div.querySelector('.copy-action-btn');
                if(copyBtn) {
                    copyBtn.addEventListener('click', () => copyToClipboard(text, copyBtn));
                }
            } else {
                div.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-2xl shadow-sm max-w-[95%]">
                        <p class="font-medium"><i class="fas fa-exclamation-triangle mr-2"></i>${text}</p>
                    </div>
                `;
            }
            
            chatContainer.appendChild(div);
            if(shouldScroll) scrollToBottom();
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start fade-in w-full';
            div.innerHTML = `
                <div class="bg-white border border-slate-200 p-5 rounded-2xl rounded-tl-none shadow-sm typing-indicator w-24 flex items-center justify-center">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Events
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialization
        window.addEventListener('DOMContentLoaded', () => {
            renderHistoryList();
            // Start on dashboard
            showView('dashboard');
        });
    </script>
</body>
</html>
